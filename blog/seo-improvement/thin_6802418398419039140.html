<h1> </h1>

<p>
<script>
function classify() {
  const na = parseFloat(document.getElementById('na').value);
  const serumOsm = parseFloat(document.getElementById('serumOsm').value);
  const urineOsm = parseFloat(document.getElementById('urineOsm').value);
  const urineNa = parseFloat(document.getElementById('urineNa').value);
  const volume = document.getElementById('volume').value;
  
  if (isNaN(na) || isNaN(serumOsm) || isNaN(urineOsm) || isNaN(urineNa)) {
    document.getElementById('result').textContent = "判定結果: 必要データを入力してください";
    document.getElementById('comment').textContent = "コメント: -";
    return;
  }
  
  let res = "";
  if (serumOsm > 295) {
    res = "高張性低Na血症";
  } else if (serumOsm >= 275) {
    res = "等張性(偽性)低Na血症";
  } else {
    if (urineOsm < 100) {
      res = "低張性:希釈性(水分過剰/低溶質)";
    } else {
      if (urineNa < 30) {
        if (volume === "Hypovolemic" || volume === "Unknown") {
          res = "低張性:体液量減少性(腎外Na喪失)";
        } else {
          res = "低張性:体液量増加性(心不全/肝硬変)";
        }
      } else {
        if (volume === "Hypovolemic") {
          res = "低張性:体液量減少性(腎性Na喪失/副腎不全/利尿薬)";
        } else if (volume === "Hypervolemic") {
          res = "低張性:体液量増加性(腎不全)";
        } else {
          res = "低張性:体液量正常性(SIADHなど)";
        }
      }
    }
  }
  
  let comment = "";
  if (res === "高張性低Na血症") {
    comment = "まず高血糖や浸透圧物質の是正を優先してください。";
  } else if (res === "等張性(偽性)低Na血症") {
    comment = "高脂血症/高蛋白血症など測定誤差が原因の可能性。Na補正は不要。";
  } else if (res === "低張性:希釈性(水分過剰/低溶質)") {
    comment = "水分制限と栄養評価を検討。原発性多飲や低溶質摂取を鑑別。";
  } else if (res.includes("減少性")) {
    comment = "輸液/食塩補給で循環を是正し、原因(嘔吐/下痢/利尿薬/副腎不全)を治療。";
  } else if (res.includes("増加性")) {
    comment = "水分・食塩制限や利尿・RAA系抑制など基礎疾患管理を。";
  } else if (res.includes("正常性")) {
    comment = "甲状腺機能・副腎機能を除外し、SIADHなら水制限やV2受容体拮抗薬を検討。";
  } else {
    comment = "追加検査を要検討。";
  }
  
  document.getElementById('result').textContent = "判定結果: " + res;
  document.getElementById('comment').textContent = "コメント: " + comment;
}

document.querySelectorAll('input, select').forEach(el => {
  el.addEventListener('input', classify);
  el.addEventListener('change', classify);
});
</script>
