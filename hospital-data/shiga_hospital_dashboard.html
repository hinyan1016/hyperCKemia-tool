  var cards=[
    {label:'病床利用率（全体）',key:'bed_util_all',unit:'%',color:'blue',lowerBetter:false},
    {label:'平均在院日数（全体）',key:'avg_stay_all',unit:'日',color:'green',lowerBetter:true},
    {label:'1日平均入院患者数',key:'inpatient_all',unit:'人',color:'orange',lowerBetter:false,fmt:true,noCompare:true},
    {label:'1日平均外来患者数',key:'outpatient_all',unit:'人',color:'purple',lowerBetter:false,fmt:true,noCompare:true}
  ];
  var html='';
  cards.forEach(function(c){
    var sv=SHIGA[c.key];
    var nv=NATIONAL[c.key];
    var diff=sv-nv;
    var pct=((diff/nv)*100).toFixed(1);
    var sign=diff>0?'+':'';
    var cls,txt;
    if(c.lowerBetter){
      cls=diff<0?'better':(diff>0?'worse':'neutral');
      txt=diff<0?'全国平均より短い':'全国平均より長い';
    }else{
      cls=diff>0?'better':(diff<0?'worse':'neutral');
      txt=Math.abs(diff)<1?'全国平均とほぼ同水準':(diff>0?'全国平均を上回る':'全国平均を下回る');
    }
    if(c.key==='avg_stay_all'){txt=diff<0?'全国平均より短い（効率的）':'全国平均より長い';}
    var rank=getRank(c.key,c.lowerBetter);
    var dispVal=c.fmt?sv.toLocaleString():sv;
    html+='<div class="stat-card '+c.color+'">';
    html+='<div class="label">'+c.label+'</div>';
    html+='<div class="value">'+dispVal+'<span class="unit"> '+c.unit+'</span></div>';
    if(c.noCompare){
      html+='<div class="compare neutral">全国合計 '+nv.toLocaleString()+c.unit+'の '+(sv/nv*100).toFixed(1)+'%</div>';
    }else{
      html+='<div class="compare '+cls+'">'+sign+pct+'% '+txt+'</div>';
    }
    if(rank)html+='<div class="rank">47都道府県中 第'+rank+'位</div>';
    html+='</div>';
  });
  document.getElementById('summary-cards').innerHTML=html;
}

// ---- Radar Chart ----
function renderRadar(){
  var metrics=[
    {key:'bed_util_all',label:'病床利用率',max:85},
    {key:'avg_stay_general',label:'一般病床\n在院日数',max:22,invert:true},
    {key:'avg_stay_all',label:'全体\n在院日数',max:40,invert:true},
    {key:'bed_util_general',label:'一般病床\n利用率',max:75},
    {key:'bed_util_therapy',label:'療養病床\n利用率',max:95},
    {key:'bed_util_psychiatric',label:'精神病床\n利用率',max:95}
  ];
  var cx=210,cy=190,r=140;
  var n=metrics.length;
  var svg='';
  // Grid
  for(var lv=1;lv<=4;lv++){
    var rr=r*lv/4;
    var pts='';
    for(var j=0;j<n;j++){
      var a=-Math.PI/2+2*Math.PI*j/n;
      pts+=(cx+rr*Math.cos(a))+','+(cy+rr*Math.sin(a))+' ';
    }
    svg+='<polygon points="'+pts+'" fill="none" stroke="#e2e8f0" stroke-width="1"/>';
  }
  // Axes + labels
  for(var j=0;j<n;j++){
    var a=-Math.PI/2+2*Math.PI*j/n;
    var ex=cx+r*Math.cos(a),ey=cy+r*Math.sin(a);
    svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+ex+'" y2="'+ey+'" stroke="#e2e8f0" stroke-width="1"/>';
    var lx=cx+(r+28)*Math.cos(a),ly=cy+(r+28)*Math.sin(a);
    var lines=metrics[j].label.split('\n');
    svg+='<text x="'+lx+'" y="'+(ly-5*(lines.length-1))+'" text-anchor="middle" font-size="11" fill="#4a5568">';
    lines.forEach(function(l,li){
      svg+='<tspan x="'+lx+'" dy="'+(li===0?0:14)+'">'+l+'</tspan>';
    });
    svg+='</text>';
  }
  // Data polygons
  function makePolygon(data,color,opacity){
    var pts='';
    for(var j=0;j<n;j++){
      var m=metrics[j];
      var v=data[m.key]||0;
      var norm=m.invert?(1-v/m.max):(v/m.max);
      norm=Math.max(0,Math.min(1,norm));
      var a=-Math.PI/2+2*Math.PI*j/n;
      var rr=r*norm;
      pts+=(cx+rr*Math.cos(a))+','+(cy+rr*Math.sin(a))+' ';
    }
    svg+='<polygon points="'+pts+'" fill="'+color+'" fill-opacity="'+opacity+'" stroke="'+color+'" stroke-width="2"/>';
    // Dots
    for(var j=0;j<n;j++){
      var m=metrics[j];
      var v=data[m.key]||0;
      var norm=m.invert?(1-v/m.max):(v/m.max);
      norm=Math.max(0,Math.min(1,norm));
      var a=-Math.PI/2+2*Math.PI*j/n;
      var rr=r*norm;
      svg+='<circle cx="'+(cx+rr*Math.cos(a))+'" cy="'+(cy+rr*Math.sin(a))+'" r="4" fill="'+color+'"/>';
    }
  }
  makePolygon(NATIONAL,'#e67e22',0.15);
  makePolygon(SHIGA,'#2e86c1',0.25);
  document.getElementById('radar').innerHTML=svg;
}

// ---- Ranking Bars ----
var RANK_METRICS=[
  {key:'bed_util_all',label:'病床利用率（%）',unit:'%'},
  {key:'avg_stay_all',label:'平均在院日数（日）',unit:'日'},
  {key:'bed_util_general',label:'一般病床利用率（%）',unit:'%'},
  {key:'avg_stay_general',label:'一般病床 在院日数（日）',unit:'日'},
  {key:'bed_util_therapy',label:'療養病床利用率（%）',unit:'%'},
  {key:'avg_stay_therapy',label:'療養病床 在院日数（日）',unit:'日'}
];
var currentRankMetric=0;

function renderRankTabs(){
  var html='';
  RANK_METRICS.forEach(function(m,i){
    html+='<button class="tab-btn'+(i===currentRankMetric?' active':'')+'" onclick="switchRank('+i+')">'+m.label+'</button>';
  });
  document.getElementById('rank-tabs').innerHTML=html;
}

function switchRank(idx){
  currentRankMetric=idx;
  renderRankTabs();
  renderRankChart();
}

function renderRankChart(){
  var m=RANK_METRICS[currentRankMetric];
  var items=PREFS_ONLY.filter(function(d){return d[m.key]!=null}).sort(function(a,b){return b[m.key]-a[m.key]});
  var maxVal=items[0][m.key];
  var natVal=NATIONAL[m.key];
  var html='';
  items.forEach(function(d){
    var w=(d[m.key]/maxVal*100).toFixed(1);
    var isShiga=d.pref==='滋賀';
    var cls=isShiga?'shiga':'other';
    var rowCls=isShiga?'is-shiga':'';
    html+='<div class="bar-row '+rowCls+'">';
    html+='<div class="bar-label">'+d.pref+'</div>';
    html+='<div class="bar-wrap">';
    html+='<div class="bar-fill '+cls+'" style="width:'+w+'%">'+d[m.key]+'</div>';
    html+='</div></div>';
  });
  // National average line note
  html+='<div style="text-align:right;font-size:0.75em;color:#e67e22;margin-top:4px">全国平均: '+natVal+m.unit+'</div>';
  var el=document.getElementById('rank-chart');
  el.innerHTML=html;
  // Auto-scroll to Shiga in rank list
  var shigaRow=el.querySelector('.is-shiga');
  if(shigaRow&&el.scrollHeight>el.clientHeight){
    setTimeout(function(){shigaRow.scrollIntoView({block:'center',behavior:'smooth'});},300);
  }
}

// ---- Bed Type Comparison ----
function renderBedComparison(){
  var utilTypes=[
    {key:'bed_util_all',label:'全体'},
    {key:'bed_util_psychiatric',label:'精神'},
    {key:'bed_util_therapy',label:'療養'},
    {key:'bed_util_general',label:'一般'}
  ];
  var stayTypes=[
    {key:'avg_stay_all',label:'全体'},
    {key:'avg_stay_psychiatric',label:'精神'},
    {key:'avg_stay_therapy',label:'療養'},
    {key:'avg_stay_general',label:'一般'}
  ];

  function makeCompBars(types,maxVal,container){
    var html='';
    types.forEach(function(t){
      var sv=SHIGA[t.key];
      var nv=NATIONAL[t.key];
      if(sv==null||nv==null)return;
      var sw=(sv/maxVal*100).toFixed(1);
      var nw=(nv/maxVal*100).toFixed(1);
      html+='<div style="margin-bottom:12px">';
      html+='<div style="font-size:0.8em;color:#4a5568;margin-bottom:2px;font-weight:600">'+t.label+'</div>';
      html+='<div class="bar-row"><div class="bar-label" style="width:40px;font-size:0.72em;color:#2e86c1">滋賀</div>';
      html+='<div class="bar-wrap"><div class="bar-fill shiga" style="width:'+sw+'%">'+sv+'</div></div></div>';
      html+='<div class="bar-row"><div class="bar-label" style="width:40px;font-size:0.72em;color:#e67e22">全国</div>';
      html+='<div class="bar-wrap"><div class="bar-fill highlight" style="width:'+nw+'%">'+nv+'</div></div></div>';
      html+='</div>';
    });
    document.getElementById(container).innerHTML=html;
  }
  makeCompBars(utilTypes,100,'bed-util-chart');
  makeCompBars(stayTypes,300,'avg-stay-chart');
}

  html+='療養病床利用率は<strong>'+SHIGA.bed_util_therapy+'%</strong>で、全国平均（'+NATIONAL.bed_util_therapy+'%）を上回っています。';

// ---- Init ----
renderCards();
renderRadar();
renderRankTabs();
renderRankChart();
renderBedComparison();
renderInsights();
</script>
